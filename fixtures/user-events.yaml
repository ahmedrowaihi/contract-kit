asyncapi: 3.0.0
info:
  title: User Events
  version: 1.0.0
  description: |
    Domain events emitted by the identity service.

    Demonstrates two coexisting payload styles in one spec:
      - userAccountCreated uses a CloudEvents 1.0 envelope.
      - userAccountDeleted uses a custom envelope.
    The generator stays envelope-agnostic — each message's TS type
    matches its payload schema verbatim.

servers:
  rabbitmq:
    host: rabbitmq.example.com:5672
    protocol: amqp

channels:
  userAccountCreated:
    address: user.account.created.*
    description: Fired after a user account is created. Payload is a CloudEvents 1.0 envelope.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: user.events
          type: topic
          durable: true
        bindingVersion: 0.3.0
    messages:
      UserAccountCreated:
        $ref: '#/components/messages/UserAccountCreated'

  userAccountDeleted:
    address: user.account.deleted.*
    description: Fired after a user account is deleted. Payload is a custom envelope.
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: user.events
          type: topic
          durable: true
        bindingVersion: 0.3.0
    messages:
      UserAccountDeleted:
        $ref: '#/components/messages/UserAccountDeleted'

operations:
  publishUserAccountCreated:
    action: send
    channel:
      $ref: '#/channels/userAccountCreated'

  publishUserAccountDeleted:
    action: send
    channel:
      $ref: '#/channels/userAccountDeleted'

components:
  messages:
    # ---------- CloudEvents 1.0 envelope ----------
    UserAccountCreated:
      name: UserAccountCreated
      title: user.account.created.v1
      contentType: application/cloudevents+json
      payload:
        type: object
        required: [specversion, id, source, type, time, data]
        properties:
          specversion: { const: '1.0' }
          id: { type: string }
          source: { type: string }
          type: { const: user.account.created.v1 }
          time: { type: string, format: date-time }
          datacontenttype: { type: string }
          subject: { type: string }
          data: { $ref: '#/components/schemas/UserAccountCreatedData' }

    # ---------- Custom envelope ----------
    UserAccountDeleted:
      name: UserAccountDeleted
      title: user.account.deleted.v1
      contentType: application/json
      payload:
        type: object
        required: [eventId, type, timestamp, source, version, payload]
        properties:
          eventId: { type: string }
          type: { const: user.account.deleted.v1 }
          timestamp: { type: string, format: date-time }
          source: { type: string }
          version: { const: v1 }
          correlationId: { type: string }
          payload: { $ref: '#/components/schemas/UserAccountDeletedData' }

  schemas:
    UserAccountCreatedData:
      type: object
      required: [userId, email, createdAt]
      properties:
        userId: { type: string }
        email: { type: string, format: email }
        phoneNumber: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    UserAccountDeletedData:
      type: object
      required: [userId, deletedAt]
      properties:
        userId: { type: string }
        archiveId: { type: string }
        deletedAt: { type: string, format: date-time }
