pre-commit:
  jobs:
    - name: sync-readme
      glob: "packages/**/package.json"
      run: pnpm sync:readme
      stage_fixed: true
    - name: format
      glob: "*.{ts,tsx,js,jsx,json,jsonc,md,yml,yaml,css}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  jobs:
    - name: typecheck
      run: pnpm typecheck
    - name: format-check
      run: pnpm format:check
