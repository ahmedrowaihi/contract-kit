name: Test asyncapi-regen action

on:
  push:
    branches: [main]
    paths:
      - 'actions/asyncapi-regen/**'
      - '.github/workflows/test-asyncapi-regen.yml'
      - 'packages/asyncapi/**'
      - 'packages/shared/codegen-core/**'
  pull_request:
    branches: [main]
    paths:
      - 'actions/asyncapi-regen/**'
      - '.github/workflows/test-asyncapi-regen.yml'
      - 'packages/asyncapi/**'
      - 'packages/shared/codegen-core/**'

# Self-test: pack the three first-party packages from the working tree
# and invoke the action against them via its `tarball-dir` input. This
# validates the proposed action + package changes together rather than
# whatever's already published on npm.

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build first-party packages
        run: pnpm turbo run build --filter='@ahmedrowaihi/codegen-core' --filter='@ahmedrowaihi/asyncapi-core' --filter='@ahmedrowaihi/asyncapi-typescript'

      - name: Pack tarballs
        run: |
          set -e
          mkdir -p tarballs
          for pkg in packages/shared/codegen-core packages/asyncapi/core packages/asyncapi/typescript; do
            (cd "$pkg" && pnpm pack --pack-destination "$GITHUB_WORKSPACE/tarballs")
          done
          ls -la tarballs

      - uses: actions/upload-artifact@v4
        with:
          name: asyncapi-regen-tarballs
          path: tarballs/*.tgz
          retention-days: 1

  full-pipeline:
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: asyncapi-regen-tarballs
          path: tarballs

      - name: Run asyncapi-regen (full plugin set)
        id: regen
        uses: ./actions/asyncapi-regen
        with:
          input: fixtures/user-events.yaml
          output: tmp-sdk/full
          commit-strategy: none
          tarball-dir: tarballs

      - name: Assert all-plugin output
        env:
          OUTPUT: tmp-sdk/full
          CHANGED: ${{ steps.regen.outputs.changed }}
          FILES_CHANGED: ${{ steps.regen.outputs.files-changed }}
        run: |
          set -e
          if [ "$CHANGED" != "true" ]; then
            echo "::error::expected outputs.changed=true; got '$CHANGED'"
            exit 1
          fi
          for file in types.gen.ts events.gen.ts event-map.gen.ts dispatch.gen.ts handlers.gen.ts amqp.gen.ts index.gen.ts; do
            if [ ! -f "$OUTPUT/$file" ]; then
              echo "::error::expected file missing: $OUTPUT/$file"
              ls -la "$OUTPUT" || true
              exit 1
            fi
          done
          echo "✓ asyncapi-regen produced $FILES_CHANGED file(s); all 7 expected files present"

  subset:
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: asyncapi-regen-tarballs
          path: tarballs

      - name: Run asyncapi-regen (types + events + index only)
        id: regen
        uses: ./actions/asyncapi-regen
        with:
          input: fixtures/user-events.yaml
          output: tmp-sdk/subset
          plugins: 'typescript,events,index'
          commit-strategy: none
          tarball-dir: tarballs

      - name: Assert subset output
        env:
          OUTPUT: tmp-sdk/subset
        run: |
          set -e
          for file in types.gen.ts events.gen.ts index.gen.ts; do
            if [ ! -f "$OUTPUT/$file" ]; then
              echo "::error::expected file missing: $OUTPUT/$file"
              exit 1
            fi
          done
          for unwanted in event-map.gen.ts dispatch.gen.ts handlers.gen.ts amqp.gen.ts; do
            if [ -f "$OUTPUT/$unwanted" ]; then
              echo "::error::unexpected file present (subset should not emit): $OUTPUT/$unwanted"
              exit 1
            fi
          done
          echo "✓ subset emit matches expected file set"
