name: Deprecate pre-3.0 packages

on:
  workflow_dispatch:

jobs:
  deprecate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Deprecate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          MSG="Moved into contract-kit 3.x — install ${PKG}@latest. See https://github.com/ahmedrowaihi/contract-kit"
          for pkg in openapi-ts-orpc openapi-ts-faker openapi-ts-typia; do
            PKG="@ahmedrowaihi/${pkg}"
            FULL_MSG="Moved into contract-kit 3.x — install ${PKG}@latest. See https://github.com/ahmedrowaihi/contract-kit"
            echo "Deprecating ${PKG} <3.0.0"
            npm deprecate "${PKG}@<3.0.0" "${FULL_MSG}"
          done
